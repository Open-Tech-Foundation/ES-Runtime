# Convenience build aliases (npm-script-like shortcuts). Cargo reads these for
# `cargo <alias>`; they only build — running JS is done with the `esrun` binary
# (e.g. `esrun file.js`), like `node`/`bun`.
[alias]
# Build the standalone esrun binary (optimized) → target/release/esrun
build-cli = "build --release -p es-runtime-cli"
# Build the whole workspace (library + CLI), optimized
build-all = "build --release --workspace"
