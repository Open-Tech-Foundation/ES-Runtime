        <h1>ES-Runtime — a secure, standards-based server runtime</h1>
        <p>
          ES-Runtime (<code>esrun</code>) is a V8-based, standards-first
          JavaScript runtime: it runs ES modules against the WinterTC
          Web-platform APIs — fetch, URL, streams, WebCrypto, encoding, timers,
          events — with notably fast startup and a low memory footprint. Host
          features (filesystem, network, HTTP server, processes) are exposed as
          asynchronous <code>runtime:</code> modules. It is ESM-only and built on
          Rust; no CommonJS and no Node.js compatibility layer.
        </p>

          <li><a href="/docs/security">Security model</a> — capability-based I/O, checked at the op boundary.</li>
          <li><a href="/docs/scope">Scope &amp; non-goals</a> — a runtime, not a toolchain; no Node.js compatibility.</li>

        <h2>API reference</h2>
