name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write  # create tags and GitHub Releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      release_es_runtime_cli: ${{ steps.check.outputs.release_es_runtime_cli }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install otf-release
        shell: bash
        env:
          OTF_RELEASE_VERSION: v0.26.0
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/v0.26.0/install.sh | bash
      - id: check
        run: |
          echo "should_release=$(otf-release check --exclude-package es-runtime-cli)" >> "$GITHUB_OUTPUT"
          echo "release_es_runtime_cli=$(otf-release check --package es-runtime-cli)" >> "$GITHUB_OUTPUT"

  matrix-es-runtime-cli:
    needs: [check-release]
    if: needs.check-release.outputs.release_es_runtime_cli == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install otf-release
        shell: bash
        env:
          OTF_RELEASE_VERSION: v0.26.0
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/v0.26.0/install.sh | bash
      - id: set
        run: echo "matrix=$(otf-release matrix --package es-runtime-cli)" >> "$GITHUB_OUTPUT"

  build-es-runtime-cli:
    needs: [check-release, matrix-es-runtime-cli]
    if: needs.check-release.outputs.release_es_runtime_cli == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-es-runtime-cli.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        if: ${{ matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.arch }}-linux-gnu
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}
      - name: Install otf-release
        if: runner.os != 'Windows'
        shell: bash
        env:
          OTF_RELEASE_VERSION: v0.26.0
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/v0.26.0/install.sh | bash
      - name: Install otf-release
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          OTF_RELEASE_VERSION: v0.26.0
        run: irm https://raw.githubusercontent.com/Open-Tech-Foundation/release/v0.26.0/install.ps1 | iex
      - name: Build es-runtime-cli
        run: otf-release build --package es-runtime-cli --target ${{ matrix.name }}/${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: es-runtime-cli-${{ matrix.name }}-${{ matrix.arch }}
          path: .artifacts/es-runtime-cli

  github-release-es-runtime-cli:
    needs: [check-release, build-es-runtime-cli]
    if: needs.check-release.outputs.release_es_runtime_cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
      - name: Install otf-release
        shell: bash
        env:
          OTF_RELEASE_VERSION: v0.26.0
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/v0.26.0/install.sh | bash
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: otf-release github-release --package es-runtime-cli --artifacts-dir .artifacts

